name: Harness Validation

on:
  pull_request:
  workflow_dispatch:

jobs:
  validate-harness:
    name: Validate harness structure
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate template harness
        shell: pwsh
        run: pwsh -File scripts/validate-harness.ps1 -Mode Template

      - name: Validate project code health
        shell: pwsh
        run: pwsh -File scripts/validate-harness.ps1 -CodeHealth -Mode Project
