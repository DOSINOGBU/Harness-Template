name: Harness Validation

on:
  pull_request:
    paths:
      - "AGENTS.md"
      - "ARCHITECTURE.md"
      - "README.md"
      - "CONTRIBUTING.md"
      - ".github/**"
      - ".harness/**"
      - "docs/**"
      - "scripts/**"
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

jobs:
  validate-harness:
    name: Validate harness structure
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate template harness
        shell: pwsh
        run: pwsh -File scripts/validate-harness.ps1 -Mode Template

      - name: Validate project code health
        shell: pwsh
        run: pwsh -File scripts/validate-harness.ps1 -CodeHealth -Mode Project

      - name: Validate maintenance drift
        shell: pwsh
        run: pwsh -File scripts/validate-harness.ps1 -Maintenance

      - name: Run validator fixture tests
        shell: pwsh
        run: pwsh -File scripts/tests/run-validator-fixtures.ps1
